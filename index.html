<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Climatic</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Kedebideri:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Life+Savers:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.0/moment.min.js"></script>
  </head>

  <body>
    <div class="container">
        <div class="content">
        <h1>☀️CLIMATIC☁️</h1>
        <input id="input" class="input" placeholder="Please enter any city name" />
        </div>
        <div class="main-weather">
          <img id="icon" alt="weather-icon"/>
            <p id="date">Date</p>
            <p id="city">City</p>
            <p class="temp" id="temp">Temp</p>
            <p id="min-max">Min and Max temp</p>
            <p id="weather-type">Sunny</p>
        </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
